services:
  db:
    image: mysql:8.0
    container_name: hotelanimais-db
    environment:
      MYSQL_DATABASE: hotelanimais
      MYSQL_USER: hoteluser
      MYSQL_PASSWORD: hotelpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "127.0.0.1:${HOST_DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  db-tests:
    image: mysql:8.0
    container_name: hotelanimais-db-tests
    environment:
      MYSQL_DATABASE: hotelanimais_test
      MYSQL_USER: hoteluser
      MYSQL_PASSWORD: hotelpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "127.0.0.1:${TEST_HOST_DB_PORT:-3308}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotelanimais-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: hotelanimais
      DB_USERNAME: hoteluser
      DB_PASSWORD: hotelpass
    ports:
      - "8080:8080"

volumes:
  mysql_data:
