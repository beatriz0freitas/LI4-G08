# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=8080

# ── Perfil ativo — usar MySQL do Docker Compose por defeito ──────────────────
spring.profiles.active=mysql

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Flyway / Migrações ────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.pt.hotel.animais=DEBUG
logging.level.org.springframework.security=INFO

# ── Actuator / Auditoria ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,auditevents
management.endpoint.auditevents.enabled=true

# --- Feature 003: Reservas, Estadias e Pagamentos (context parameters)
app.feature.reservas.enabled=true
app.feature.reservas.default-currency=EUR
app.feature.estadias.max-simultaneous-per-animal=1
app.feature.pagamentos.require-method=true
