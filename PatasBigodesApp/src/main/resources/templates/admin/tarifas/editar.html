<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/head :: head"></th:block>
    <title>Editar Tarifa</title>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <th:block th:replace="fragments/navbar :: navbar"></th:block>
    <th:block th:replace="fragments/sidebar :: sidebar"></th:block>
    <div class="content-wrapper">
        <section class="content-header"><div class="container-fluid"><h1>Editar Tarifa</h1></div></section>
        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <form th:action="@{/admin/tarifas/{id}(id=${tarifa.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="card-body">
                            <div class="form-group">
                                <label>Tipo</label>
                                <input class="form-control" th:value="${tarifa.tipoAlojamento}" disabled />
                            </div>
                            <div class="form-group">
                                <label for="tarifaDiaria">Tarifa diária</label>
                                <input id="tarifaDiaria" name="tarifaDiaria" type="number" min="0" step="0.01" class="form-control" th:value="${tarifa.tarifaDiaria}" required />
                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                            <a th:href="@{/admin/tarifas}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
    <th:block th:replace="fragments/footer :: footer"></th:block>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
