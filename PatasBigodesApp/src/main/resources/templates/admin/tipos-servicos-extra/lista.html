<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/head :: head"></th:block>
    <title>Serviços Extra</title>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <th:block th:replace="fragments/navbar :: navbar"></th:block>
    <th:block th:replace="fragments/sidebar :: sidebar"></th:block>
    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-8"><h1>Serviços Extra</h1></div>
                    <div class="col-sm-4 text-sm-right">
                        <a th:href="@{/admin/tipos-servicos-extra/novo}" class="btn btn-primary"><i class="fas fa-plus"></i> Novo serviço</a>
                    </div>
                </div>
            </div>
        </section>
        <section class="content">
            <div class="container-fluid">
                <div th:if="${mensagem}" th:class="'alert ' + (${tipo} == 'erro' ? 'alert-danger' : 'alert-success')" th:text="${mensagem}"></div>
                <div class="card">
                    <div class="card-body table-responsive p-0">
                        <table class="table table-hover">
                            <thead><tr><th>Nome</th><th>Descrição</th><th>Estado</th><th class="text-right">Ações</th></tr></thead>
                            <tbody>
                            <tr th:each="item : ${tipos}">
                                <td th:text="${item.nome}">Banho</td>
                                <td th:text="${item.descricao}">Descrição</td>
                                <td>
                                    <span th:if="${item.ativo}" class="badge badge-success">Ativo</span>
                                    <span th:unless="${item.ativo}" class="badge badge-secondary">Inativo</span>
                                </td>
                                <td class="text-right">
                                    <a th:href="@{/admin/tipos-servicos-extra/{id}/editar(id=${item.id})}" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                                    <form th:if="${item.ativo}" th:action="@{/admin/tipos-servicos-extra/{id}/desativar(id=${item.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-warning"><i class="fas fa-ban"></i></button>
                                    </form>
                                    <form th:unless="${item.ativo}" th:action="@{/admin/tipos-servicos-extra/{id}/reativar(id=${item.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-success"><i class="fas fa-check"></i></button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(tipos)}"><td colspan="4" class="text-muted">Ainda não existem serviços extra configurados.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <th:block th:replace="fragments/footer :: footer"></th:block>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
