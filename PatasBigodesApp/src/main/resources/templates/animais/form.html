<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:insert="fragments/head :: head"></head>
<body class="hold-transition sidebar-mini layout-fixed">
	<div class="wrapper">
		<th:block th:insert="fragments/navbar :: navbar"></th:block>
		<th:block th:insert="fragments/sidebar :: sidebar"></th:block>

		<div class="content-wrapper">
			<div class="content-header">
				<div class="container-fluid">
					<div class="row mb-2">
						<div class="col-sm-6">
							<h1 class="m-0">Registar Animal</h1>
						</div>
						<div class="col-sm-6">
							<ol class="breadcrumb float-sm-right">
								<li class="breadcrumb-item"><a th:href="@{/}">Início</a></li>
								<li class="breadcrumb-item"><a th:href="@{/tutores}">Tutores</a></li>
								<li class="breadcrumb-item active">Novo Animal</li>
							</ol>
						</div>
					</div>
				</div>
			</div>

			<section class="content">
				<div class="container-fluid">
					<!-- Mensagens de erro globais -->
					<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
						<i class="fas fa-exclamation-circle mr-2"></i>
						<span th:text="${errorMessage}">Mensagem de erro</span>
						<button type="button" class="close" data-dismiss="alert">
							<span>&times;</span>
						</button>
					</div>

					<!-- Card do formulário -->
					<div class="card card-primary">
						<div class="card-header">
							<h3 class="card-title" th:text="'Dados do Animal' + (${tutor} ? ' - ' + ${tutor.nome} : '')">
								Dados do Animal
							</h3>
						</div>

						<form th:action="@{/tutores/{tutorId}/animais(tutorId=${animalForm.tutorId})}" 
							  th:object="${animalForm}" method="post" class="form-horizontal">
							<div class="card-body">
								<!-- Nome -->
								<div class="form-group row">
									<label for="nome" class="col-sm-2 col-form-label">Nome <span class="text-danger">*</span></label>
									<div class="col-sm-10">
										<input type="text" th:field="*{nome}" id="nome" 
											   class="form-control" 
											   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
											   placeholder="Nome do animal">
										<div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}">
											<ul class="mb-0 pl-3">
												<li th:each="err : ${#fields.errors('nome')}" th:text="${err}">Erro</li>
											</ul>
										</div>
									</div>
								</div>

								<!-- Espécie -->
								<div class="form-group row">
									<label for="especie" class="col-sm-2 col-form-label">Espécie <span class="text-danger">*</span></label>
									<div class="col-sm-10">
										<select th:field="*{especie}" id="especie" 
												class="form-control" 
												th:classappend="${#fields.hasErrors('especie')} ? 'is-invalid' : ''">
											<option value="">Selecionar...</option>
											<option th:each="esp : ${T(pt.hotel.animais.model.enums.Especie).values()}" 
													th:value="${esp}" 
													th:text="${esp.label}">Espécie</option>
										</select>
										<div class="invalid-feedback" th:if="${#fields.hasErrors('especie')}">
											<ul class="mb-0 pl-3">
												<li th:each="err : ${#fields.errors('especie')}" th:text="${err}">Erro</li>
											</ul>
										</div>
									</div>
								</div>

								<!-- Raça -->
								<div class="form-group row">
									<label for="raca" class="col-sm-2 col-form-label">Raça <span class="text-danger">*</span></label>
									<div class="col-sm-10">
										<input type="text" th:field="*{raca}" id="raca" 
											   class="form-control" 
											   th:classappend="${#fields.hasErrors('raca')} ? 'is-invalid' : ''"
											   placeholder="Ex: Labrador, Siamês">
										<div class="invalid-feedback" th:if="${#fields.hasErrors('raca')}">
											<ul class="mb-0 pl-3">
												<li th:each="err : ${#fields.errors('raca')}" th:text="${err}">Erro</li>
											</ul>
										</div>
									</div>
								</div>

								<!-- Data de Nascimento -->
								<div class="form-group row">
									<label for="dataNascimento" class="col-sm-2 col-form-label">Data de Nascimento <span class="text-danger">*</span></label>
									<div class="col-sm-10">
										<input type="date" th:field="*{dataNascimento}" id="dataNascimento" 
											   class="form-control" 
											   th:classappend="${#fields.hasErrors('dataNascimento')} ? 'is-invalid' : ''">
										<div class="invalid-feedback" th:if="${#fields.hasErrors('dataNascimento')}">
											<ul class="mb-0 pl-3">
												<li th:each="err : ${#fields.errors('dataNascimento')}" th:text="${err}">Erro</li>
											</ul>
										</div>
									</div>
								</div>

								<!-- Peso -->
								<div class="form-group row">
									<label for="peso" class="col-sm-2 col-form-label">Peso (kg) <span class="text-danger">*</span></label>
									<div class="col-sm-10">
										<input type="number" th:field="*{peso}" id="peso" 
											   class="form-control" 
											   th:classappend="${#fields.hasErrors('peso')} ? 'is-invalid' : ''"
											   step="0.01" min="0" placeholder="Ex: 25.50">
										<div class="invalid-feedback" th:if="${#fields.hasErrors('peso')}">
											<ul class="mb-0 pl-3">
												<li th:each="err : ${#fields.errors('peso')}" th:text="${err}">Erro</li>
											</ul>
										</div>
									</div>
								</div>

								<!-- Estado de Saúde -->
								<div class="form-group row">
									<label for="estadoSaude" class="col-sm-2 col-form-label">Estado de Saúde <span class="text-danger">*</span></label>
									<div class="col-sm-10">
										<select th:field="*{estadoSaude}" id="estadoSaude" 
												class="form-control" 
												th:classappend="${#fields.hasErrors('estadoSaude')} ? 'is-invalid' : ''">
											<option th:each="estado : ${T(pt.hotel.animais.model.enums.EstadoSaude).values()}" 
													th:value="${estado}" 
													th:text="${estado.label}">Estado</option>
										</select>
										<div class="invalid-feedback" th:if="${#fields.hasErrors('estadoSaude')}">
											<ul class="mb-0 pl-3">
												<li th:each="err : ${#fields.errors('estadoSaude')}" th:text="${err}">Erro</li>
											</ul>
										</div>
									</div>
								</div>

								<!-- Necessidades Alimentares -->
								<div class="form-group row">
									<label for="necessidadesAlimentares" class="col-sm-2 col-form-label">Necessidades Alimentares</label>
									<div class="col-sm-10">
										<textarea th:field="*{necessidadesAlimentares}" id="necessidadesAlimentares" 
												  class="form-control" 
												  rows="2" 
												  placeholder="Ex: Ração específica, alergias"></textarea>
										<small class="form-text text-muted">Informações sobre dieta especial ou restrições</small>
									</div>
								</div>

								<!-- Medicação -->
								<div class="form-group row">
									<label for="medicacaoCurso" class="col-sm-2 col-form-label">Medicação em Curso</label>
									<div class="col-sm-10">
										<textarea th:field="*{medicacaoCurso}" id="medicacaoCurso" 
												  class="form-control" 
												  rows="2" 
												  placeholder="Ex: Dosagem, frequência, observações"></textarea>
										<small class="form-text text-muted">Informações sobre medicação atual ou tratamentos</small>
									</div>
								</div>
							</div>

							<!-- Botões de ação -->
							<div class="card-footer">
								<button type="submit" class="btn btn-success">
									<i class="fas fa-save mr-2"></i>Guardar
								</button>
								<a th:href="@{/tutores/{id}(id=${animalForm.tutorId})}" class="btn btn-secondary">
									<i class="fas fa-times mr-2"></i>Cancelar
								</a>
							</div>
						</form>
					</div>
				</div>
			</section>
		</div>

		<th:block th:insert="fragments/footer :: footer"></th:block>
	</div>

	<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
