<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:insert="~{fragments/head :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
	<div class="wrapper">
		<th:block th:insert="~{fragments/navbar :: navbar}"></th:block>
		<th:block th:insert="~{fragments/sidebar :: sidebar}"></th:block>

		<div class="content-wrapper">
			<div class="content-header">
				<div class="container-fluid">
					<div class="row mb-2">
						<div class="col-sm-6">
							<h1 class="m-0">Animais</h1>
						</div>
						<div class="col-sm-6">
							<ol class="breadcrumb float-sm-right">
								<li class="breadcrumb-item"><a th:href="@{/}">Início</a></li>
								<li class="breadcrumb-item active">Animais</li>
							</ol>
						</div>
					</div>
				</div>
			</div>

			<section class="content">
				<div class="container-fluid">
					<!-- Mensagens de sucesso/erro -->
					<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
						<i class="fas fa-check-circle mr-2"></i>
						<span th:text="${successMessage}">Mensagem de sucesso</span>
						<button type="button" class="close" data-dismiss="alert" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>

					<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
						<i class="fas fa-exclamation-circle mr-2"></i>
						<span th:text="${errorMessage}">Mensagem de erro</span>
						<button type="button" class="close" data-dismiss="alert" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>

					<!-- Card de listagem -->
					<div class="card">
						<div class="card-header bg-primary">
							<h3 class="card-title">Lista de Animais</h3>
						</div>
						<div class="card-body">
							<div th:if="${animais.isEmpty()}" class="alert alert-info">
								<i class="fas fa-info-circle mr-2"></i>
								Nenhum animal registado no sistema.
							</div>

							<table th:unless="${animais.isEmpty()}" class="table table-striped table-hover">
								<thead class="bg-light">
									<tr>
										<th>Nome</th>
										<th>Espécie</th>
										<th>Raça</th>
										<th>Data de Nascimento</th>
										<th>Estado de Saúde</th>
										<th>Tutor</th>
										<th>Ações</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="animal : ${animais}">
										<td th:text="${animal.nome}">Nome</td>
										<td>
											<span class="badge" 
												  th:classappend="${animal.especie.toString() == 'CAO'} ? 'badge-primary' : 'badge-info'"
												  th:text="${animal.especie.label}">Espécie</span>
										</td>
										<td th:text="${animal.raca}">Raça</td>
										<td th:text="${#temporals.format(animal.dataNascimento, 'dd/MM/yyyy')}">Data</td>
										<td>
											<span class="badge"
												  th:classappend="${animal.estadoSaude.toString() == 'NORMAL' ? 'badge-success' : (animal.estadoSaude.toString() == 'ALTERADO' ? 'badge-warning' : 'badge-danger')}"
												  th:text="${animal.estadoSaude.label}">Estado</span>
										</td>
										<td>
											<a th:href="@{/tutores/{id}(id=${animal.tutor.id})}" 
											   th:text="${animal.tutor.nome}">Tutor</a>
										</td>
										<td>
											<a th:href="@{/animais/{id}(id=${animal.id})}" 
											   class="btn btn-sm btn-info" title="Ver detalhes">
												<i class="fas fa-eye"></i>
											</a>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</section>
		</div>

		<th:block th:insert="~{fragments/footer :: footer}"></th:block>
	</div>

	<!-- Scripts -->
	<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
