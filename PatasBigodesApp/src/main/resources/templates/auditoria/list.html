<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:insert="fragments/head :: head"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
	<th:block th:insert="fragments/navbar :: navbar"></th:block>
	<th:block th:insert="fragments/sidebar :: sidebar"></th:block>

	<div class="content-wrapper">
		<div class="content-header">
			<div class="container-fluid">
				<div class="row mb-2">
					<div class="col-sm-6"><h1 class="m-0">Auditoria</h1></div>
					<div class="col-sm-6 text-right">
						<a th:href="@{/auditoria/exportar/csv(dataInicio=${filtros.dataInicio},dataFim=${filtros.dataFim},utilizadorId=${filtros.utilizadorId},operacao=${filtros.operacao},entidade=${filtros.entidade},resultado=${filtros.resultado})}" class="btn btn-outline-secondary">
							<i class="fas fa-file-csv mr-2"></i>CSV
						</a>
					</div>
				</div>
			</div>
		</div>

		<section class="content">
			<div class="container-fluid">
				<th:block th:insert="~{fragments/alerts :: alerts}"></th:block>
				<div class="card">
					<div class="card-header">
						<h3 class="card-title">Filtros</h3>
					</div>
					<form th:action="@{/auditoria}" th:object="${filtros}" method="get">
						<div class="card-body">
							<div class="row align-items-end">
								<div class="col-md-2">
									<div class="form-group">
										<label for="dataInicio">Data início</label>
										<input id="dataInicio" type="date" th:field="*{dataInicio}" class="form-control">
									</div>
								</div>
								<div class="col-md-2">
									<div class="form-group">
										<label for="dataFim">Data fim</label>
										<input id="dataFim" type="date" th:field="*{dataFim}" class="form-control">
									</div>
								</div>
								<div class="col-md-2">
									<div class="form-group">
										<label for="utilizadorId">Utilizador</label>
										<select id="utilizadorId" th:field="*{utilizadorId}" class="form-control">
											<option value="">Todos</option>
											<option th:each="colaborador : ${colaboradores}" th:value="${colaborador.id}" th:text="${colaborador.nome}">Colaborador</option>
										</select>
									</div>
								</div>
								<div class="col-md-2">
									<div class="form-group">
										<label for="operacao">Operação</label>
										<input id="operacao" type="text" th:field="*{operacao}" class="form-control" placeholder="CRIAR_RESERVA">
									</div>
								</div>
								<div class="col-md-2">
									<div class="form-group">
										<label for="entidade">Entidade</label>
										<input id="entidade" type="text" th:field="*{entidade}" class="form-control" placeholder="Reserva">
									</div>
								</div>
								<div class="col-md-2">
									<div class="form-group">
										<label for="resultado">Resultado</label>
										<select id="resultado" th:field="*{resultado}" class="form-control">
											<option value="">Todos</option>
											<option th:each="resultado : ${resultadosAuditoria}" th:value="${resultado}" th:text="${resultado}">SUCESSO</option>
										</select>
									</div>
								</div>
							</div>
						</div>
						<div class="card-footer">
							<button type="submit" class="btn btn-primary">
								<i class="fas fa-filter mr-2"></i>Aplicar filtros
							</button>
							<a th:href="@{/auditoria}" class="btn btn-outline-secondary ml-2">
								<i class="fas fa-eraser mr-2"></i>Limpar filtros
							</a>
						</div>
					</form>
				</div>

				<div class="card">
					<div class="card-header d-flex align-items-center">
						<h3 class="card-title mb-0">Eventos</h3>
						<span class="text-muted small ml-auto" th:text="${eventos.totalElements} + ' evento(s)'">0 eventos</span>
					</div>
					<div class="card-body table-responsive p-0">
						<table class="table table-hover text-nowrap mb-0">
							<thead>
							<tr>
								<th>Timestamp</th>
								<th>Utilizador</th>
								<th>Operação</th>
								<th>Entidade</th>
								<th>ID</th>
								<th>Ação</th>
								<th>Resultado</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="evento : ${eventos.content}">
								<td th:text="${#temporals.format(evento.timestamp, 'yyyy-MM-dd HH:mm:ss')}">2026-05-26 10:00:00</td>
								<td th:text="${evento.utilizador}">Diretor</td>
								<td th:text="${evento.operacao}">CRIAR_RESERVA</td>
								<td th:text="${evento.entidade}">Reserva</td>
								<td th:text="${evento.entityId}">1</td>
								<td th:text="${evento.acao}">CREATE</td>
								<td>
									<span th:if="${evento.resultado != null and evento.resultado.name() == 'SUCESSO'}" class="badge badge-success">SUCESSO</span>
									<span th:unless="${evento.resultado != null and evento.resultado.name() == 'SUCESSO'}" class="badge badge-danger" th:text="${evento.resultado}">FALHA</span>
								</td>
							</tr>
							<tr th:if="${eventos.empty}">
								<td colspan="7" class="text-center text-muted">Sem dados de auditoria para os filtros selecionados.</td>
							</tr>
							</tbody>
						</table>
					</div>
					<div class="card-footer d-flex align-items-center" th:if="${eventos.totalPages > 1}">
						<a class="btn btn-sm btn-outline-secondary"
						   th:classappend="${eventos.first} ? ' disabled' : ''"
						   th:href="@{/auditoria(page=${eventos.number - 1},dataInicio=${filtros.dataInicio},dataFim=${filtros.dataFim},utilizadorId=${filtros.utilizadorId},operacao=${filtros.operacao},entidade=${filtros.entidade},resultado=${filtros.resultado})}">
							<i class="fas fa-chevron-left mr-1"></i>Anterior
						</a>
						<span class="mx-3 small text-muted" th:text="'Página ' + ${eventos.number + 1} + ' de ' + ${eventos.totalPages}">Página 1 de 1</span>
						<a class="btn btn-sm btn-outline-secondary"
						   th:classappend="${eventos.last} ? ' disabled' : ''"
						   th:href="@{/auditoria(page=${eventos.number + 1},dataInicio=${filtros.dataInicio},dataFim=${filtros.dataFim},utilizadorId=${filtros.utilizadorId},operacao=${filtros.operacao},entidade=${filtros.entidade},resultado=${filtros.resultado})}">
							Seguinte<i class="fas fa-chevron-right ml-1"></i>
						</a>
					</div>
				</div>
			</div>
		</section>
	</div>

	<th:block th:insert="fragments/footer :: footer"></th:block>
</div>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
