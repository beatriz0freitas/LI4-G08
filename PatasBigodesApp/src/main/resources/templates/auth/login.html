<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="fragments/head :: head"></th:block>
</head>
<body class="hold-transition login-page">
<div class="login-box">
	<div class="login-logo">
		<strong>Hotel</strong> Animais
	</div>

	<div class="card card-outline card-primary">
		<div class="card-header text-center">
			<span class="h4">Acesso à Aplicação</span>
		</div>
		<div class="card-body">
			<p class="login-box-msg">Introduza as suas credenciais para entrar no sistema.</p>

			<div class="alert alert-danger" th:if="${param.error}">
				Utilizador ou palavra-passe inválidos.
			</div>

			<div class="alert alert-success" th:if="${param.logout}">
				Sessão terminada com sucesso.
			</div>

			<form th:action="@{/login}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

				<div class="input-group mb-3">
					<input type="text" class="form-control" name="username" placeholder="Utilizador" required>
					<div class="input-group-append">
						<div class="input-group-text"><i class="fas fa-user"></i></div>
					</div>
				</div>

				<div class="input-group mb-3">
					<input type="password" class="form-control" name="password" placeholder="Palavra-passe" required>
					<div class="input-group-append">
						<div class="input-group-text"><i class="fas fa-lock"></i></div>
					</div>
				</div>

				<div class="row">
					<div class="col-12">
						<button type="submit" class="btn btn-primary btn-block">Entrar</button>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
