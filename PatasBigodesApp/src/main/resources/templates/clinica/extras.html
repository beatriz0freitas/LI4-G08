<!doctype html>
<html>
<head><meta charset="utf-8"><title>Serviços Extra</title></head>
<body>
<h1>Serviços Extra (Estadia [[${estadiaId}]])</h1>
<form th:action="@{/extras/create}" method="post">
    <input type="hidden" name="estadiaId" th:value="${estadiaId}" />
    <label>Tipo: <input type="text" name="tipo" /></label>
    <label>Custo: <input type="number" step="0.01" name="custo" /></label>
    <label>DataHora: <input type="datetime-local" name="dataHora" /></label>
    <button type="submit">Registar Serviço</button>
</form>
<hr/>
<ul>
    <li th:each="s : ${extras}">
        <span th:text="${s.dataHora}"></span> - <span th:text="${s.tipo}"></span> - <span th:text="${s.custo}"></span>
    </li>
</ul>
</body>
</html>
