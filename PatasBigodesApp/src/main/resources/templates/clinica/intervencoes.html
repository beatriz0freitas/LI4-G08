<!doctype html>
<html>
<head><meta charset="utf-8"><title>Intervenções Clínicas</title></head>
<body>
<h1>Intervenções Clínicas (Estadia [[${estadiaId}]])</h1>
<form th:action="@{/clinica/intervencoes/create}" method="post" class="registo-clinico-form">
    <input type="hidden" name="estadiaId" th:value="${estadiaId}" />
    <label>Descrição: <input type="text" name="descricao" /></label>
    <label>Custo: <input type="number" step="0.01" name="custo" /></label>
    <label>DataHora: <input type="datetime-local" name="dataHora" class="registo-datahora" readonly /></label>
    <button type="submit">Registar Intervenção</button>
</form>
<hr/>
<ul>
    <li th:each="i : ${intervencoes}">
        <span th:text="${i.dataHora}"></span> - <span th:text="${i.descricao}"></span> - <span th:text="${i.custo}"></span>
    </li>
</ul>
</body>
</html>
