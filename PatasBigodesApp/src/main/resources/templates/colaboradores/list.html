<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:insert="fragments/head :: head"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
	<th:block th:insert="fragments/navbar :: navbar"></th:block>
	<th:block th:insert="fragments/sidebar :: sidebar"></th:block>

	<div class="content-wrapper">
		<div class="content-header">
			<div class="container-fluid">
				<div class="row mb-2">
					<div class="col-sm-6"><h1 class="m-0">Colaboradores</h1></div>
					<div class="col-sm-6 text-right">
						<a th:href="@{/colaboradores/novo}" class="btn btn-primary">
							<i class="fas fa-user-plus mr-2"></i>Novo colaborador
						</a>
					</div>
				</div>
			</div>
		</div>

		<section class="content">
			<div class="container-fluid">
				<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

				<div class="card">
					<div class="card-header">
						<h3 class="card-title">Perfis de acesso</h3>
					</div>
					<div class="card-body table-responsive p-0">
						<table class="table table-hover text-nowrap">
							<thead>
							<tr>
								<th>Nome</th>
								<th>Username</th>
								<th>Email</th>
								<th>Tipo</th>
								<th>Estado</th>
								<th class="text-right">Ações</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="colaborador : ${colaboradores}">
								<td th:text="${colaborador.nome}">Nome</td>
								<td th:text="${colaborador.username}">username</td>
								<td th:text="${colaborador.email}">email</td>
								<td th:text="${colaborador.tipoColaborador != null ? colaborador.tipoColaborador.getDescricao() : '-'}">Diretor</td>
								<td>
									<span th:if="${colaborador.ativo}" class="badge badge-success">Ativo</span>
									<span th:unless="${colaborador.ativo}" class="badge badge-secondary">Inativo</span>
								</td>
								<td class="text-right">
									<a th:href="@{/colaboradores/{id}/editar(id=${colaborador.id})}" class="btn btn-sm btn-outline-primary">
										<i class="fas fa-edit"></i>
									</a>
									<form th:if="${colaborador.ativo}" th:action="@{/colaboradores/{id}/desativar(id=${colaborador.id})}" method="post" class="d-inline">
										<button type="submit" class="btn btn-sm btn-outline-danger">
											<i class="fas fa-user-slash"></i>
										</button>
									</form>
								</td>
							</tr>
							<tr th:if="${#lists.isEmpty(colaboradores)}">
								<td colspan="6" class="text-center text-muted">Sem colaboradores registados.</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</section>
	</div>

	<th:block th:insert="fragments/footer :: footer"></th:block>
</div>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
