<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(title='Histórico de Planos')}">
<head>
    <meta charset="utf-8">
    <title>Histórico de Planos de Cuidados</title>
</head>
<body>
<main th:fragment="content">
    <!-- Cabeçalho -->
    <div class="container-fluid">
        <h1>Histórico de Planos de Cuidados</h1>
        <p class="text-muted">Animal ID: <span th:text="${animalId}"></span></p>

        <!-- Tabela de Planos -->
        <div class="card">
            <div class="card-header">
                <h5 class="card-title">Planos Anteriores</h5>
            </div>
            <div class="card-body">
                <div th:if="${planosPage.totalElements == 0}" class="alert alert-info">
                    Nenhum plano de cuidados registado para este animal
                </div>

                <table th:if="${planosPage.totalElements > 0}" class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Estadia</th>
                            <th>Data Início</th>
                            <th>Data Fim</th>
                            <th>Prioridade</th>
                            <th>Status</th>
                            <th>Tarefas</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="plano : ${planosPage.content}">
                            <td th:text="${plano.id}"></td>
                            <td th:text="${plano.estadiaId}"></td>
                            <td th:text="${#temporals.format(plano.dataInicio, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${#temporals.format(plano.dataFim, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span th:text="${plano.prioridade}"
                                      th:class="${'badge ' + (plano.prioridade != null && plano.prioridade.name() == 'CRITICO' ? 'badge-danger' :
                                                plano.prioridade != null && plano.prioridade.name() == 'URGENTE' ? 'badge-warning' : 'badge-info')}"></span>
                            </td>
                            <td>
                                <span th:text="${plano.ativo == true ? 'Ativo' : 'Encerrado'}" 
                                      th:class="${'badge ' + (plano.ativo == true ? 'badge-success' : 'badge-secondary')}"></span>
                            </td>
                            <td>
                                <span th:text="${plano.tarefas != null ? plano.tarefas.size() : 0}" class="badge badge-secondary"></span>
                            </td>
                            <td>
                                <a th:href="@{/plano-cuidados(estadiaId=${plano.estadiaId})}" class="btn btn-sm btn-info">Ver</a>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Paginação -->
                <nav th:if="${planosPage.totalPages > 1}" class="mt-4">
                    <ul class="pagination">
                        <li th:class="${planosPage.first ? 'page-item disabled' : 'page-item'}">
                            <a class="page-link" th:href="@{/plano-cuidados/animal/{animalId}/historico(animalId=${animalId}, page=0)}">Primeira</a>
                        </li>
                        <li th:class="${planosPage.hasPrevious() ? 'page-item' : 'page-item disabled'}">
                            <a class="page-link" th:href="@{/plano-cuidados/animal/{animalId}/historico(animalId=${animalId}, page=${planosPage.number - 1})}">Anterior</a>
                        </li>
                        <li th:each="pageNum : ${#numbers.sequence(0, planosPage.totalPages - 1)}" 
                            th:class="${pageNum == planosPage.number ? 'page-item active' : 'page-item'}">
                            <a class="page-link" th:href="@{/plano-cuidados/animal/{animalId}/historico(animalId=${animalId}, page=${pageNum})}" 
                               th:text="${pageNum + 1}"></a>
                        </li>
                        <li th:class="${planosPage.hasNext() ? 'page-item' : 'page-item disabled'}">
                            <a class="page-link" th:href="@{/plano-cuidados/animal/{animalId}/historico(animalId=${animalId}, page=${planosPage.number + 1})}">Próxima</a>
                        </li>
                        <li th:class="${planosPage.last ? 'page-item disabled' : 'page-item'}">
                            <a class="page-link" th:href="@{/plano-cuidados/animal/{animalId}/historico(animalId=${animalId}, page=${planosPage.totalPages - 1})}">Última</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</main>
</body>
</html>
