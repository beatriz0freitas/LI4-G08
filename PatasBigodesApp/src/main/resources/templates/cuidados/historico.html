<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(title='Histórico de Planos de Cuidados')}">
<head>
    <meta charset="utf-8">
    <title>Histórico de Planos de Cuidados</title>
</head>
<body>
<main th:fragment="content">
    <div class="filter-panel mb-3 d-flex flex-wrap justify-content-between align-items-center">
        <div>
            <span class="section-tag mb-2"><i class="fas fa-history"></i> Cuidados</span>
            <strong class="d-block text-uppercase text-primary">Histórico de Planos</strong>
        </div>
        <a class="btn btn-outline-secondary btn-sm mt-2 mt-sm-0" th:href="@{/plano-cuidados}">
            <i class="fas fa-arrow-left mr-1"></i> Voltar
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div th:if="${planosPage == null or planosPage.isEmpty()}" class="text-center text-muted py-5">
                Não existem planos de cuidados registados para este animal.
            </div>
            <table th:if="${planosPage != null and !planosPage.isEmpty()}" class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Animal</th>
                        <th>Alojamento</th>
                        <th>Início</th>
                        <th>Fim</th>
                        <th>Prioridade</th>
                        <th>Estado</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="plano : ${planosPage.content}">
                        <td th:text="${plano.id}">1</td>
                        <td th:text="${plano.animalNome ?: ('Animal #' + plano.animalId)}">Animal</td>
                        <td th:text="${plano.alojamentoIdentificacao ?: '-'}">A1</td>
                        <td th:text="${plano.dataInicio != null ? #temporals.format(plano.dataInicio, 'dd/MM/yyyy') : '-'}">01/01/2026</td>
                        <td th:text="${plano.dataFim != null ? #temporals.format(plano.dataFim, 'dd/MM/yyyy') : '-'}">-</td>
                        <td th:text="${plano.prioridade}">NORMAL</td>
                        <td>
                            <span th:if="${plano.ativo}" class="badge badge-success">Ativo</span>
                            <span th:unless="${plano.ativo}" class="badge badge-secondary">Concluído</span>
                        </td>
                        <td>
                            <a th:if="${plano.estadiaId != null}"
                               th:href="@{/plano-cuidados(estadiaId=${plano.estadiaId})}"
                               class="btn btn-sm btn-outline-primary">Ver</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${planosPage != null and planosPage.totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${planosPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/plano-cuidados/animal/{id}/historico(id=${animalId}, page=${planosPage.number - 1})}">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="${(planosPage.number + 1) + ' / ' + planosPage.totalPages}">1 / 2</span>
            </li>
            <li class="page-item" th:classappend="${planosPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/plano-cuidados/animal/{id}/historico(id=${animalId}, page=${planosPage.number + 1})}">Próxima</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
