<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="fragments/head :: head"></th:block>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
	<th:block th:replace="fragments/navbar :: navbar"></th:block>
	<th:block th:replace="fragments/sidebar :: sidebar"></th:block>

	<div class="content-wrapper">
		<section class="content-header">
			<div class="container-fluid">
				<div class="row mb-2">
					<div class="col-sm-6">
						<h1>Dashboard</h1>
					</div>
				</div>
			</div>
		</section>

		<section class="content">
			<div class="container-fluid">
				<div class="row">
					<div class="col-lg-3 col-6">
						<div class="small-box bg-info">
							<div class="inner">
								<h3 th:text="${alojamentosDisponiveis}">0</h3>
								<p>Alojamentos disponíveis</p>
							</div>
							<div class="icon"><i class="fas fa-house"></i></div>
						</div>
					</div>

					<div class="col-lg-3 col-6">
						<div class="small-box bg-success">
							<div class="inner">
								<h3 th:text="${reservasAtivas}">0</h3>
								<p>Reservas ativas</p>
							</div>
							<div class="icon"><i class="fas fa-calendar-check"></i></div>
						</div>
					</div>

					<div class="col-lg-3 col-6">
						<div class="small-box bg-warning">
							<div class="inner">
								<h3 th:text="${estadiasEmCurso}">0</h3>
								<p>Estadias em curso</p>
							</div>
							<div class="icon"><i class="fas fa-dog"></i></div>
						</div>
					</div>

					<div class="col-lg-3 col-6">
						<div class="small-box bg-danger">
							<div class="inner">
								<h3 th:text="${pagamentosPendentes}">0</h3>
								<p>Pagamentos pendentes</p>
							</div>
							<div class="icon"><i class="fas fa-euro-sign"></i></div>
						</div>
					</div>
				</div>

				<div class="row">
					<div class="col-12">
						<div class="card">
							<div class="card-header">
								<h3 class="card-title">Visão operacional e financeira</h3>
							</div>
							<div class="card-body">
								<p><strong>Faturação registada:</strong> <span th:text="${faturacaoTotal}">0</span></p>
								<a th:href="@{/relatorios}" class="btn btn-primary">
									<i class="fas fa-chart-bar mr-2"></i>Abrir relatórios
								</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</section>
	</div>

	<th:block th:replace="fragments/footer :: footer"></th:block>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
