<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:insert="~{fragments/head :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <th:block th:insert="~{fragments/navbar :: navbar}"></th:block>
    <th:block th:insert="~{fragments/sidebar :: sidebar}"></th:block>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0">Estadia #<span th:text="${estadia.id}">1</span></h1>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a th:href="@{/}">Início</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/estadias/lista}">Estadias</a></li>
                            <li class="breadcrumb-item active" th:text="'#' + ${estadia.id}">Estadia</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <th:block th:insert="~{fragments/alerts :: alerts}"></th:block>

                <div class="mb-3">
                    <a th:href="@{/estadias/lista}" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left mr-2"></i>Voltar à lista de estadias
                    </a>
                </div>

                <div class="row">
                    <div class="col-lg-6">
                        <div class="card">
                            <div class="card-header bg-primary">
                                <h3 class="card-title">Informações da Estadia</h3>
                            </div>
                            <div class="card-body">
                                <dl class="row mb-0">
                                    <dt class="col-sm-4">Estado</dt>
                                    <dd class="col-sm-8" th:text="${estadia.estado}">EM_CURSO</dd>
                                    <dt class="col-sm-4">Entrada</dt>
                                    <dd class="col-sm-8" th:text="${#temporals.format(estadia.dataInicio, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</dd>
                                    <dt class="col-sm-4">Saída</dt>
                                    <dd class="col-sm-8">
                                        <span th:if="${estadia.dataFim != null}" th:text="${#temporals.format(estadia.dataFim, 'dd/MM/yyyy HH:mm')}">02/01/2026 10:00</span>
                                        <span th:unless="${estadia.dataFim != null}" class="text-muted">Ainda em curso</span>
                                    </dd>
                                    <dt class="col-sm-4">Reserva</dt>
                                    <dd class="col-sm-8">
                                        <a th:href="@{/reservas/{id}(id=${estadia.reserva.id})}" th:text="'#' + ${estadia.reserva.id}">#1</a>
                                    </dd>
                                </dl>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="card">
                            <div class="card-header bg-info">
                                <h3 class="card-title">Animal e Alojamento</h3>
                            </div>
                            <div class="card-body">
                                <dl class="row mb-0">
                                    <dt class="col-sm-4">Tutor</dt>
                                    <dd class="col-sm-8">
                                        <a th:href="@{/tutores/{id}(id=${estadia.reserva.tutor.id})}" th:text="${estadia.reserva.tutor.nome}">Tutor</a>
                                    </dd>
                                    <dt class="col-sm-4">Animal</dt>
                                    <dd class="col-sm-8">
                                        <a th:href="@{/animais/{id}(id=${estadia.reserva.animal.id})}" th:text="${estadia.reserva.animal.nome}">Animal</a>
                                    </dd>
                                    <dt class="col-sm-4">Alojamento</dt>
                                    <dd class="col-sm-8" th:text="${estadia.reserva.alojamento.identificacao}">A1</dd>
                                    <dt class="col-sm-4">Tipo</dt>
                                    <dd class="col-sm-8" th:text="${estadia.reserva.alojamento.tipo}">CANINO</dd>
                                </dl>
                            </div>
                        </div>

                        <a th:if="${estadia.estado.toString() == 'EM_CURSO'}"
                           th:href="@{/estadias/check-out(estadiaId=${estadia.id},redirectTo=${'/estadias/' + estadia.id})}"
                           class="btn btn-warning btn-block">
                            <i class="fas fa-right-from-bracket mr-2"></i>Registar check-out
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <th:block th:insert="~{fragments/footer :: footer}"></th:block>
</div>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
