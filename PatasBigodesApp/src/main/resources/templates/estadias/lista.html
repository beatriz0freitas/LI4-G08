<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:insert="~{fragments/head :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <th:block th:insert="~{fragments/navbar :: navbar}"></th:block>
    <th:block th:insert="~{fragments/sidebar :: sidebar}"></th:block>
    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1 class="m-0">Estadias</h1></div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a th:href="@{/}">Início</a></li>
                            <li class="breadcrumb-item active">Estadias</li>
                        </ol>
                    </div>
                </div>
            </div>
        </div>
        <section class="content">
            <div class="container-fluid">
                <th:block th:insert="~{fragments/alerts :: alerts}"></th:block>
                
                <!-- Filtros -->
                <div class="card card-outline card-primary mb-3">
                    <div class="card-header">
                        <h3 class="card-title">Filtros</h3>
                    </div>
                    <div class="card-body">
                        <form class="form-inline" method="get" th:action="@{/estadias/lista}">
                            <div class="form-group mr-3">
                                <label for="estado" class="mr-2">Estado:</label>
                                <select id="estado" name="estado" class="form-control">
                                    <option value="">Todos os estados</option>
                                    <option value="EM_CURSO"
                                            th:selected="${filtroEstado != null and filtroEstado == 'EM_CURSO'}">
                                        Em curso
                                    </option>
                                    <option value="TERMINADA"
                                            th:selected="${filtroEstado != null and filtroEstado == 'TERMINADA'}">
                                        Terminada
                                    </option>
                                </select>
                            </div>
                            <div class="form-group mr-3">
                                <label for="dataInicio" class="mr-2">De:</label>
                                <input id="dataInicio" name="dataInicio" type="date" class="form-control" 
                                       th:value="${dataInicio}">
                            </div>
                            <div class="form-group mr-3">
                                <label for="dataFim" class="mr-2">Até:</label>
                                <input id="dataFim" name="dataFim" type="date" class="form-control" 
                                       th:value="${dataFim}">
                            </div>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-filter mr-1"></i> Filtrar</button>
                        </form>
                    </div>
                </div>

                <!-- Tabela de Estadias -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Lista de Estadias</h3>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(estadias)}" class="alert alert-info">
                            Não existem estadias para os filtros selecionados.
                        </div>
                        <table th:unless="${#lists.isEmpty(estadias)}" class="table table-sm table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Animal</th>
                                    <th>Alojamento</th>
                                    <th>Check-in</th>
                                    <th>Check-out</th>
                                    <th>Duração</th>
                                    <th>Estado</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="estadia : ${estadias}">
                                    <td th:text="${estadia.animalNome}">Animal</td>
                                    <td th:text="${estadia.alojamentoIdentificacao}">Alojamento</td>
                                    <td th:text="${#temporals.format(estadia.dataInicio, 'dd/MM/yyyy HH:mm')}">Check-in</td>
                                    <td>
                                        <span th:if="${estadia.dataFim != null}" 
                                              th:text="${#temporals.format(estadia.dataFim, 'dd/MM/yyyy HH:mm')}">
                                        </span>
                                        <span th:unless="${estadia.dataFim != null}" class="text-muted">-</span>
                                    </td>
                                    <td th:text="${estadia.duracao}">Duração</td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${estadia.estadoCss == 'st-ocupado' ? 'badge-warning' : 'badge-success'}"
                                              th:text="${estadia.estadoLabel}">
                                        </span>
                                    </td>
                                    <td>
                                        <a th:if="${estadia.reservaId != null}" th:href="@{/reservas/{id}(id=${estadia.reservaId})}" class="btn btn-sm btn-info mr-1" title="Consultar detalhes da reserva">
                                            <i class="fas fa-eye mr-1"></i> Detalhes
                                        </a>
                                        <th:block th:if="${estadia.estado.name() == 'EM_CURSO'}">
                                            <form method="post" th:action="@{/estadias/check-out}" style="display: inline;">
                                                <input type="hidden" name="estadiaId" th:value="${estadia.id}">
                                                <input type="hidden" name="redirectTo" th:value="@{/estadias/lista}">
                                                <select name="metodoPagamento" class="form-control form-control-sm d-inline-block mr-1" style="width: 145px;" required>
                                                    <option th:each="metodo : ${metodosPagamento}" th:value="${metodo}" th:text="${metodo.name() == 'NUMERARIO' ? 'Numerário' : (metodo.name() == 'CARTAO_DEBITO' ? 'Cartão débito' : 'Cartão crédito')}">Método</option>
                                                </select>
                                                <button type="submit" class="btn btn-sm btn-success" title="Realizar Check-out" 
                                                        onclick="return confirm('Tem a certeza que deseja realizar o check-out?')">
                                                    <i class="fas fa-sign-out-alt"></i> Check-out
                                                </button>
                                            </form>
                                        </th:block>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer small text-muted">
                        Total de estadias: <strong th:text="${#lists.size(estadias)}">0</strong>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <th:block th:insert="~{fragments/footer :: footer}"></th:block>
</div>
</body>
</html>
