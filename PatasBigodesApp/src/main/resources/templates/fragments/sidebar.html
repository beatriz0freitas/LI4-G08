<th:block xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="sidebar">
	<aside class="main-sidebar sidebar-dark-primary elevation-4">
		<a th:href="@{/}" class="brand-link text-decoration-none">
			<i class="fas fa-paw brand-image img-circle elevation-3 bg-white p-2 text-primary"></i>
			<span class="brand-text font-weight-light">Hotel Animais</span>
		</a>

		<div class="sidebar">
			<nav class="mt-3">
				<ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
					<li class="nav-item">
						<a th:href="@{/}" class="nav-link" th:classappend="${activePage == 'home'} ? ' active' : ''">
							<i class="nav-icon fas fa-home"></i>
							<p>Início</p>
						</a>
					</li>
					<li class="nav-item has-treeview" sec:authorize="hasRole('DIRETOR')" th:classappend="${activePage == 'dashboard' or activePage == 'relatorios' or activePage == 'colaboradores'} ? ' menu-open' : ''">
						<a href="#" class="nav-link" th:classappend="${activePage == 'dashboard' or activePage == 'relatorios' or activePage == 'colaboradores'} ? ' active' : ''">
							<i class="nav-icon fas fa-briefcase"></i>
							<p>Direção<i class="right fas fa-angle-left"></i></p>
						</a>
						<ul class="nav nav-treeview">
							<li class="nav-item">
								<a th:href="@{/dashboard}" class="nav-link" th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
									<i class="far fa-circle nav-icon"></i>
									<p>Dashboard</p>
								</a>
							</li>
							<li class="nav-item">
								<a th:href="@{/relatorios}" class="nav-link" th:classappend="${activePage == 'relatorios'} ? ' active' : ''">
									<i class="far fa-circle nav-icon"></i>
									<p>Relatórios</p>
								</a>
							</li>
							<li class="nav-item">
								<a th:href="@{/colaboradores}" class="nav-link" th:classappend="${activePage == 'colaboradores'} ? ' active' : ''">
									<i class="far fa-circle nav-icon"></i>
									<p>Colaboradores</p>
								</a>
							</li>
						</ul>
					</li>
					<li class="nav-item has-treeview" sec:authorize="hasAnyRole('DIRETOR', 'FUNCIONARIO_RECEPCAO')" th:classappend="${activePage == 'tutores' or activePage == 'animais' or activePage == 'reservas'} ? ' menu-open' : ''">
						<a href="#" class="nav-link" th:classappend="${activePage == 'tutores' or activePage == 'animais' or activePage == 'reservas'} ? ' active' : ''">
							<i class="nav-icon fas fa-users"></i>
							<p>Receção<i class="right fas fa-angle-left"></i></p>
						</a>
						<ul class="nav nav-treeview">
							<li class="nav-item">
								<a th:href="@{/tutores}" class="nav-link" th:classappend="${activePage == 'tutores'} ? ' active' : ''">
									<i class="far fa-circle nav-icon"></i>
									<p>Tutores</p>
								</a>
							</li>
							<li class="nav-item">
								<a th:href="@{/animais}" class="nav-link" th:classappend="${activePage == 'animais'} ? ' active' : ''">
									<i class="far fa-circle nav-icon"></i>
									<p>Animais</p>
								</a>
							</li>
							<li class="nav-item">
								<a th:href="@{/reservas}" class="nav-link" th:classappend="${activePage == 'reservas'} ? ' active' : ''">
									<i class="far fa-circle nav-icon"></i>
									<p>Reservas</p>
								</a>
							</li>
						</ul>
					</li>
					<li class="nav-item has-treeview" sec:authorize="hasAnyRole('DIRETOR', 'FUNCIONARIO_RECEPCAO', 'MEDICO_VETERINARIO')" th:classappend="${activePage == 'estadias' or activePage == 'historico'} ? ' menu-open' : ''">
						<a href="#" class="nav-link" th:classappend="${activePage == 'estadias' or activePage == 'historico'} ? ' active' : ''">
							<i class="nav-icon fas fa-bed"></i>
							<p>Estadias<i class="right fas fa-angle-left"></i></p>
						</a>
						<ul class="nav nav-treeview">
							<li class="nav-item" sec:authorize="hasAnyRole('DIRETOR', 'FUNCIONARIO_RECEPCAO')">
								<a th:href="@{/estadias}" class="nav-link" th:classappend="${activePage == 'estadias'} ? ' active' : ''">
									<i class="far fa-circle nav-icon"></i>
									<p>Check-in / Check-out</p>
								</a>
							</li>
							<li class="nav-item" sec:authorize="hasAnyRole('DIRETOR', 'FUNCIONARIO_RECEPCAO', 'MEDICO_VETERINARIO')">
								<a th:href="@{/historico}" class="nav-link" th:classappend="${activePage == 'historico'} ? ' active' : ''">
									<i class="far fa-circle nav-icon"></i>
									<p>Histórico</p>
								</a>
							</li>
						</ul>
					</li>
					<li class="nav-item" sec:authorize="hasAnyRole('DIRETOR', 'MEDICO_VETERINARIO')">
						<a th:href="@{/clinica}" class="nav-link" th:classappend="${activePage == 'clinica'} ? ' active' : ''">
							<i class="nav-icon fas fa-notes-medical"></i>
							<p>Clínica</p>
						</a>
					</li>
					<li class="nav-item" sec:authorize="hasAnyRole('DIRETOR', 'FUNCIONARIO_RECEPCAO', 'RESPONSAVEL_LIMPEZA')">
						<a th:href="@{/alojamentos}" class="nav-link" th:classappend="${activePage == 'alojamentos'} ? ' active' : ''">
							<i class="nav-icon fas fa-house"></i>
							<p>Alojamentos</p>
						</a>
					</li>
					<li class="nav-item" sec:authorize="hasAnyRole('DIRETOR', 'RESPONSAVEL_LIMPEZA')">
						<a th:href="@{/limpeza}" class="nav-link" th:classappend="${activePage == 'limpeza'} ? ' active' : ''">
							<i class="nav-icon fas fa-broom"></i>
							<p>Limpeza</p>
						</a>
					</li>
				</ul>
			</nav>
		</div>
	</aside>
</th:block>
