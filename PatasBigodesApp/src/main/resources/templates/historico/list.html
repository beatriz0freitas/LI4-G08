<!doctype html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="fragments/head :: head"></th:block>
    <title>Histórico de Estadia</title>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <th:block th:replace="fragments/navbar :: navbar"></th:block>
    <th:block th:replace="fragments/sidebar :: sidebar"></th:block>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>Histórico de Estadia</h1>
                    </div>
                    <div class="col-sm-6 text-right">
                        <form th:action="@{/historico}" method="get" class="form-row justify-content-end">
                            <div class="form-group col-md-3 mb-2">
                                <input type="number" name="clienteId" class="form-control" placeholder="Cliente" th:value="${clienteId}" />
                            </div>
                            <div class="form-group col-md-3 mb-2">
                                <input type="number" name="animalId" class="form-control" placeholder="Animal" th:value="${animalId}" />
                            </div>
                            <div class="form-group col-md-3 mb-2">
                                <select name="estado" class="form-control">
                                    <option value="">Todos os estados</option>
                                    <option th:each="estadoOption : ${T(pt.hotel.animais.model.enums.EstadoEstadia).values()}"
                                            th:value="${estadoOption}"
                                            th:text="${estadoOption}"
                                            th:selected="${estado != null and estado == estadoOption}">
                                    </option>
                                </select>
                            </div>
                            <div class="form-group col-md-3 mb-2">
                                <input type="date" name="dataInicio" class="form-control" th:value="${dataInicio}" />
                            </div>
                            <div class="form-group col-md-3 mb-2">
                                <input type="date" name="dataFim" class="form-control" th:value="${dataFim}" />
                            </div>
                            <div class="form-group col-md-2 mb-2">
                                <select name="size" class="form-control">
                                    <option th:value="10" th:selected="${pageSize == 10}">10 / página</option>
                                    <option th:value="20" th:selected="${pageSize == 20}">20 / página</option>
                                    <option th:value="50" th:selected="${pageSize == 50}">50 / página</option>
                                </select>
                            </div>
                            <div class="form-group col-md-2 mb-2 d-flex align-items-start">
                                <button type="submit" class="btn btn-secondary btn-block">Filtrar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h3 class="card-title mb-0">Resultados</h3>
                                <span class="text-muted small" th:if="${historicoPage != null}" th:text="${historicoPage.totalElements + ' registos encontrados'}">0 registos encontrados</span>
                            </div>
                            <div class="card-body table-responsive p-0">
                                <table class="table table-striped">
                                    <thead>
                                    <tr>
                                        <th>ID Estadia</th>
                                        <th>Reserva</th>
                                        <th>Animal</th>
                                        <th>Tutor</th>
                                        <th>Início</th>
                                        <th>Fim</th>
                                        <th>Estado</th>
                                        <th></th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="estadia : ${estadias}">
                                        <td th:text="${estadia.id}">1</td>
                                        <td th:text="${estadia.reserva.id}">#1</td>
                                        <td th:text="${estadia.reserva.animal.nome}">Firmino</td>
                                        <td th:text="${estadia.reserva.tutor.nome}">Ana</td>
                                        <td th:text="${estadia.dataInicio}">2026-01-01</td>
                                        <td th:text="${estadia.dataFim}">2026-01-05</td>
                                        <td th:text="${estadia.estado}">EM_CURSO</td>
                                        <td>
                                            <span class="badge badge-info" th:text="${estadia.reserva.alojamento.identificacao}">A1</span>
                                            <a th:if="${estadia.estado.toString() == 'EM_CURSO'}"
                                               th:href="@{/estadias(estadiaId=${estadia.id})}"
                                               class="btn btn-sm btn-success ml-2">
                                                <i class="fas fa-right-from-bracket"></i> Preparar Check-out
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(estadias)}">
                                        <td colspan="8" class="text-center">Sem registos</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="card-footer clearfix" th:if="${historicoPage != null and historicoPage.totalPages > 1}">
                                <div class="float-left text-muted small" th:text="${'Página ' + (historicoPage.number + 1) + ' de ' + historicoPage.totalPages}">Página 1 de 1</div>
                                <ul class="pagination pagination-sm m-0 float-right">
                                    <li class="page-item" th:classappend="${historicoPage.first} ? ' disabled' : ''">
                                        <a class="page-link" th:href="@{/historico(page=${historicoPage.number - 1}, size=${historicoPage.size}, clienteId=${clienteId}, animalId=${animalId}, estado=${estado}, dataInicio=${dataInicio}, dataFim=${dataFim})}">Anterior</a>
                                    </li>
                                    <li class="page-item active">
                                        <span class="page-link" th:text="${historicoPage.number + 1}">1</span>
                                    </li>
                                    <li class="page-item" th:classappend="${historicoPage.last} ? ' disabled' : ''">
                                        <a class="page-link" th:href="@{/historico(page=${historicoPage.number + 1}, size=${historicoPage.size}, clienteId=${clienteId}, animalId=${animalId}, estado=${estado}, dataInicio=${dataInicio}, dataFim=${dataFim})}">Seguinte</a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <th:block th:replace="fragments/footer :: footer"></th:block>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
