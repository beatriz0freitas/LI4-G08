<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt" th:fragment="page(title)">
<head th:insert="~{fragments/head :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
	<div class="wrapper">
		<!-- Main Header -->
		<th:block th:insert="~{fragments/navbar :: navbar}"></th:block>

		<!-- Left Sidebar -->
		<th:block th:insert="~{fragments/sidebar :: sidebar}"></th:block>

		<!-- Content Wrapper -->
		<div class="content-wrapper">
			<!-- Content Header (Page header) -->
			<div class="content-header">
				<div class="container-fluid">
					<div class="row mb-2">
						<div class="col-sm-6">
							<h1 class="m-0" th:text="${pageTitle != null ? pageTitle : (title != null ? title : 'Página')}">Título</h1>
						</div>
						<div class="col-sm-6">
							<ol class="breadcrumb float-sm-right">
								<li class="breadcrumb-item"><a href="/" th:href="@{/}">Início</a></li>
								<li class="breadcrumb-item active" th:text="${breadcrumb != null ? breadcrumb : 'Página Atual'}">Atual</li>
							</ol>
						</div>
					</div>
				</div>
			</div>

			<!-- Main content -->
			<section class="content">
				<div class="container-fluid">
					<th:block th:replace="~{::content}"></th:block>
				</div>
			</section>
		</div>

		<!-- Footer -->
		<th:block th:insert="~{fragments/footer :: footer}"></th:block>
	</div>

	<!-- AdminLTE JS -->
	<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
