<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="fragments/head :: head"></th:block>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
	<th:block th:replace="fragments/navbar :: navbar"></th:block>
	<th:block th:replace="fragments/sidebar :: sidebar"></th:block>

	<div class="content-wrapper">
		<section class="content-header">
			<div class="container-fluid">
				<div class="row mb-2">
					<div class="col-sm-6">
						<h1>Limpeza de Alojamentos</h1>
					</div>
				</div>
			</div>
		</section>

		<section class="content">
			<div class="container-fluid">
				<div class="alert alert-success" th:if="${msgSucesso}" th:text="${msgSucesso}"></div>
				<div class="alert alert-danger" th:if="${msgErro}" th:text="${msgErro}"></div>

				<div class="card">
					<div class="card-header">
						<h3 class="card-title">Alojamentos pendentes</h3>
					</div>
					<div class="card-body table-responsive p-0">
						<table class="table table-hover text-nowrap mb-0">
							<thead>
							<tr>
								<th>Identificação</th>
								<th>Estado de Limpeza</th>
								<th>Ação</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="alojamento : ${alojamentosPendentes}">
								<td th:text="${alojamento.identificacao}">01</td>
								<td>
									<span class="badge badge-warning" th:text="${alojamento.estadoLimpeza}">PENDENTE</span>
								</td>
								<td>
									<form th:action="@{/limpeza/{id}/limpo(id=${alojamento.id})}" method="post" class="mb-0">
										<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
										<button type="submit" class="btn btn-success btn-sm">
											Marcar como limpo
										</button>
									</form>
								</td>
							</tr>
							<tr th:if="${#lists.isEmpty(alojamentosPendentes)}">
								<td colspan="3" class="text-center text-muted py-4">Não existem alojamentos pendentes de limpeza.</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</section>
	</div>

	<th:block th:replace="fragments/footer :: footer"></th:block>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
