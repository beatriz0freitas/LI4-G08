<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="fragments/head :: head"></th:block>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
	<th:block th:replace="fragments/navbar :: navbar"></th:block>
	<th:block th:replace="fragments/sidebar :: sidebar"></th:block>

	<div class="content-wrapper">
		<section class="content-header">
			<div class="container-fluid">
				<div class="row mb-2">
					<div class="col-sm-6">
						<span class="section-tag mb-2"><i class="fas fa-broom"></i> Limpeza</span>
						<h1>Alojamentos pendentes de Limpeza</h1>
					</div>
				</div>
			</div>
		</section>

		<section class="content">
			<div class="container-fluid">
				<div class="alert alert-success alert-dismissible fade show" th:if="${msgSucesso}" th:text="${msgSucesso}"></div>
				<div class="alert alert-danger alert-dismissible fade show" th:if="${msgErro}" th:text="${msgErro}"></div>

				<div class="callout callout-warning filter-panel mb-3">
					<i class="fas fa-exclamation-triangle mr-2"></i>
					<strong th:text="${(totalPendentesLimpeza != null ? totalPendentesLimpeza : 0) + ' alojamentos pendentes de limpeza'}">0 alojamentos pendentes de limpeza</strong>
				</div>

				<div class="card">
					<div class="card-header bg-warning">
						<h3 class="card-title">Alojamentos pendentes de Limpeza</h3>
					</div>
					<div class="card-body table-responsive p-0">
						<table class="table table-hover text-nowrap mb-0">
							<thead>
							<tr>
								<th>Alojamento</th>
								<th>Tipo</th>
								<th>Estado de Limpeza</th>
								<th>Ação</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="alojamento : ${alojamentosPendentes}">
								<td><strong th:text="${alojamento.identificacao}">01</strong></td>
								<td th:text="${alojamento.tipo}">CANINO</td>
								<td>
										<span class="badge status-warning" th:text="${alojamento.estadoLimpeza}">PENDENTE</span>
								</td>
								<td>
									<form th:action="@{/limpeza/{id}/limpo(id=${alojamento.id})}" method="post" class="mb-0">
										<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
											<button type="submit" class="btn btn-primary btn-sm">
											Marcar como limpo
										</button>
									</form>
								</td>
							</tr>
							<tr th:if="${#lists.isEmpty(alojamentosPendentes)}">
									<td colspan="4">
										<div class="empty-state my-3">
											<i class="fas fa-check-circle fa-2x text-success mb-2"></i>
											<div class="font-weight-bold mb-1">Não existem alojamentos pendentes de limpeza.</div>
											<div class="text-muted small">Tudo pronto para novas reservas.</div>
										</div>
									</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</section>
	</div>

	<th:block th:replace="fragments/footer :: footer"></th:block>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
