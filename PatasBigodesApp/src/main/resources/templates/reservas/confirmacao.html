<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:insert="~{fragments/head :: head}"></head>
<body class="hold-transition sidebar-mini layout-fixed">
	<div class="wrapper">
		<th:block th:insert="~{fragments/navbar :: navbar}"></th:block>
		<th:block th:insert="~{fragments/sidebar :: sidebar}"></th:block>

		<div class="content-wrapper">
			<div class="content-header">
				<div class="container-fluid">
					<div class="row mb-2">
						<div class="col-sm-6">
							<h1 class="m-0">Reserva #<span th:text="${reserva.id}">ID</span></h1>
						</div>
						<div class="col-sm-6">
							<ol class="breadcrumb float-sm-right">
								<li class="breadcrumb-item"><a th:href="@{/}">Início</a></li>
								<li class="breadcrumb-item"><a th:href="@{/reservas}">Reservas</a></li>
								<li class="breadcrumb-item active" th:text="'#' + ${reserva.id}">Reserva</li>
							</ol>
						</div>
					</div>
				</div>
			</div>

			<section class="content">
				<div class="container-fluid">
					<th:block th:insert="~{fragments/alerts :: alerts}"></th:block>
					<div class="row">
						<div class="col-md-6">
							<div class="card">
								<div class="card-header bg-primary">
									<h3 class="card-title">Informações da Reserva</h3>
								</div>
								<div class="card-body">
									<div class="mb-2"><strong>ID:</strong> <span th:text="${reserva.id}">ID</span></div>
									<div class="mb-2"><strong>Estado:</strong> 
										<span class="badge"
											  th:classappend="${reserva.estado.toString() == 'ATIVA' ? 'badge-warning' : (reserva.estado.toString() == 'CONFIRMADA' ? 'badge-success' : (reserva.estado.toString() == 'CANCELADA' ? 'badge-danger' : 'badge-secondary'))}"
											  th:text="${reserva.estado.label}">Estado</span>
									</div>
									<div class="mb-2"><strong>Data de Início:</strong> <span th:text="${#temporals.format(reserva.dataInicio, 'dd/MM/yyyy')}">Data</span></div>
									<div class="mb-2"><strong>Data de Fim:</strong> <span th:text="${#temporals.format(reserva.dataFim, 'dd/MM/yyyy')}">Data</span></div>
									<div class="mb-2"><strong>Data de Criação:</strong> <span th:text="${#temporals.format(reserva.dataCriacao, 'dd/MM/yyyy HH:mm')}">Data</span></div>
								</div>
							</div>
						</div>

						<div class="col-md-6">
							<div class="card">
								<div class="card-header bg-info">
									<h3 class="card-title">Detalhes</h3>
								</div>
								<div class="card-body">
									<div class="mb-2"><strong>Tutor:</strong> <a th:href="@{/tutores/{id}(id=${reserva.tutor.id})}" th:text="${reserva.tutor.nome}">Tutor</a></div>
									<div class="mb-2"><strong>Animal:</strong> <a th:href="@{/animais/{id}(id=${reserva.animal.id})}" th:text="${reserva.animal.nome}">Animal</a></div>
									<div class="mb-2"><strong>Alojamento:</strong> <span th:text="${reserva.alojamento.identificacao}">Alojamento</span></div>
								</div>
							</div>

							<div class="card mt-3">
								<div class="card-header bg-warning">
									<h3 class="card-title">Ações</h3>
								</div>
								<div class="card-body">
									<form th:if="${reserva.podeFazerCheckIn()}" th:action="@{/estadias/check-in}" method="post" class="mb-3">
										<input type="hidden" name="reservaId" th:value="${reserva.id}">
										<input type="hidden" name="redirectTo" th:value="@{/reservas/{id}(id=${reserva.id})}">
										<div class="form-group">
											<label for="metodoPagamentoCheckIn">Método de pagamento do check-in</label>
											<select id="metodoPagamentoCheckIn" name="metodoPagamento" class="form-control" required>
												<option th:each="metodo : ${metodosPagamento}" th:value="${metodo}" th:text="${metodo.name() == 'NUMERARIO' ? 'Numerário' : (metodo.name() == 'CARTAO_DEBITO' ? 'Cartão de débito' : 'Cartão de crédito')}">Método</option>
											</select>
										</div>
										<button type="submit" class="btn btn-success btn-block">
											<i class="fas fa-right-to-bracket mr-2"></i>Registar check-in
										</button>
									</form>
									<form th:if="${estadiaId != null and reserva.isConfirmada()}" th:action="@{/estadias/check-out}" method="post" class="mb-3">
										<input type="hidden" name="estadiaId" th:value="${estadiaId}">
										<input type="hidden" name="redirectTo" th:value="@{/reservas/{id}(id=${reserva.id})}">
										<div class="form-group">
											<label for="metodoPagamentoCheckOut">Método de pagamento do check-out</label>
											<select id="metodoPagamentoCheckOut" name="metodoPagamento" class="form-control" required>
												<option th:each="metodo : ${metodosPagamento}" th:value="${metodo}" th:text="${metodo.name() == 'NUMERARIO' ? 'Numerário' : (metodo.name() == 'CARTAO_DEBITO' ? 'Cartão de débito' : 'Cartão de crédito')}">Método</option>
											</select>
										</div>
										<div th:if="${extrasTotal != null}" class="small text-muted mb-2">
											Valor complementar estimado: <strong><span th:text="${extrasTotal}">0.00</span> EUR</strong>
										</div>
										<button type="submit" class="btn btn-warning btn-block" onclick="return confirm('Tem a certeza que deseja realizar o check-out?')">
											<i class="fas fa-right-from-bracket mr-2"></i>Registar check-out
										</button>
									</form>
									<form th:if="${reserva.podeSerCancelada()}" th:action="@{/reservas/{id}/cancelar(id=${reserva.id})}" method="post" class="d-inline">
										<input type="hidden" name="redirectTo" th:value="@{/reservas/{id}(id=${reserva.id})}">
										<button type="submit" class="btn btn-danger btn-block mb-2" onclick="return confirm('Tem a certeza que deseja cancelar?')">
											<i class="fas fa-times mr-2"></i>Cancelar Reserva
										</button>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>
			</section>
		</div>

		<th:block th:insert="~{fragments/footer :: footer}"></th:block>
	</div>

	<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
