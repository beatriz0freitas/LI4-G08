<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head th:insert="fragments/head :: head"></head>
<body class="hold-transition sidebar-mini layout-fixed">
	<div class="wrapper">
		<th:block th:insert="fragments/navbar :: navbar"></th:block>
		<th:block th:insert="fragments/sidebar :: sidebar"></th:block>

		<div class="content-wrapper">
			<div class="content-header">
				<div class="container-fluid">
					<div class="row mb-2">
						<div class="col-sm-6">
							<h1 class="m-0">Tutores</h1>
						</div>
						<div class="col-sm-6">
							<ol class="breadcrumb float-sm-right">
								<li class="breadcrumb-item"><a th:href="@{/}">Início</a></li>
								<li class="breadcrumb-item active">Tutores</li>
							</ol>
						</div>
					</div>
				</div>
			</div>

			<section class="content">
				<div class="container-fluid">
					<!-- Mensagens de sucesso/erro -->
					<div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
						<i class="fas fa-check-circle mr-2"></i>
						<span th:text="${successMessage}">Mensagem de sucesso</span>
						<button type="button" class="close" data-dismiss="alert" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>

					<div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
						<i class="fas fa-exclamation-circle mr-2"></i>
						<span th:text="${errorMessage}">Mensagem de erro</span>
						<button type="button" class="close" data-dismiss="alert" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>

					<!-- Card de ações -->
					<div class="card card-primary mb-4">
						<div class="card-header">
							<h3 class="card-title">Gestão de Tutores</h3>
						</div>
						<div class="card-body">
							<!-- Barra de busca -->
							<form th:action="@{/tutores}" method="get" class="mb-3">
								<div class="input-group">
									<input type="text" name="search" class="form-control" 
										   placeholder="Buscar por NIF ou nome..." 
										   th:value="${search}">
									<div class="input-group-append">
										<button class="btn btn-outline-secondary" type="submit">
											<i class="fas fa-search"></i> Buscar
										</button>
										<a th:href="@{/tutores}" class="btn btn-outline-secondary ml-2">
											<i class="fas fa-redo"></i> Limpar
										</a>
									</div>
								</div>
							</form>

							<!-- Botão para novo tutor -->
							<a th:href="@{/tutores/novo}" class="btn btn-success mb-3">
								<i class="fas fa-plus"></i> Novo Tutor
							</a>
						</div>
					</div>

					<!-- Tabela de tutores -->
					<div class="card">
						<div class="card-header">
							<h3 class="card-title">Lista de Tutores</h3>
						</div>
						<div class="card-body table-responsive p-0">
							<div th:if="${tutores.isEmpty()}" class="alert alert-info m-3">
								<i class="fas fa-info-circle mr-2"></i>
								Nenhum tutor encontrado.
							</div>

							<table th:unless="${tutores.isEmpty()}" class="table table-hover">
								<thead>
									<tr>
										<th>Nome</th>
										<th>NIF</th>
										<th>Contacto</th>
										<th>Email</th>
										<th>Data Registo</th>
										<th>Ações</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="tutor : ${tutores}">
										<td>
											<a th:href="@{/tutores/{id}(id=${tutor.id})}" 
											   th:text="${tutor.nome}" 
											   class="font-weight-bold"></a>
										</td>
										<td th:text="${tutor.nif}">NIF</td>
										<td th:text="${tutor.contacto}">Contacto</td>
										<td th:text="${tutor.email}">Email</td>
										<td th:text="${#temporals.format(tutor.dataRegisto, 'dd/MM/yyyy HH:mm')}">Data</td>
										<td>
											<a th:href="@{/tutores/{id}/editar(id=${tutor.id})}" 
											   class="btn btn-sm btn-info" title="Editar">
												<i class="fas fa-edit"></i>
											</a>
											<a th:href="@{/tutores/{id}(id=${tutor.id})}" 
											   class="btn btn-sm btn-primary" title="Ver detalhes">
												<i class="fas fa-eye"></i>
											</a>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</section>
		</div>

		<th:block th:insert="fragments/footer :: footer"></th:block>
	</div>

	<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
