<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · Patas&amp;Bigodes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css">
<style>.callout-danger{border-left:4px solid #dd4b39;background:#fdecea;color:#b71c1c;padding:.6rem .8rem;border-radius:3px;}</style>
</head>
<body class="hold-transition login-page" style="background:#ecf0f5;">
<div class="login-box">
  <div class="login-logo"><b>Patas&amp;Bigodes</b><div class="text-muted" style="font-size:.85rem;">Sistema de Gestão</div></div>
  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">Iniciar Sessão na Aplicação</p>
      <form action="dashboard.html">
        <div class="input-group mb-3">
          <input type="text" class="form-control" placeholder="Utilizador" value="cfaria">
          <div class="input-group-append"><div class="input-group-text"><span class="fas fa-user"></span></div></div>
        </div>
        <div class="input-group mb-3">
          <input type="password" class="form-control" placeholder="Palavra-passe" value="password">
          <div class="input-group-append"><div class="input-group-text"><span class="fas fa-lock"></span></div></div>
        </div>
        <div class="callout-danger mb-3"><i class="fas fa-exclamation-circle"></i> Credenciais inválidas. Tente novamente.</div>
        <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> ENTRAR</button>
      </form>
      <hr>
      <p class="text-center text-muted" style="font-size:.8rem;">Acesso restrito a colaboradores autorizados.<br>Em caso de bloqueio: contactar o Diretor.</p>
    </div>
  </div>
  <p class="text-center text-muted mt-3" style="font-size:.75rem;font-style:italic;">UC-01 · Todos os perfis</p>
</div>
</body></html>
